# tasks.yaml — Pure Business Toolkit Version
# Fully supports key toolkit outputs for business analysis, including:
# quick_reference_tools, market_intelligence, communication_templates, role_specific_guides

business_analysis_task:
  description: >
    Run a complete sustainability business analysis for the company or selected dataset.
    Includes benchmarking, operational review, opportunity identification, and toolkit generation.
    Must produce all key deliverables for the business toolkit.
  agent: business_toolkit_agent
  input:
    - company_profile
    - industry_sector
    - operations_data
  output:
    - business_benchmark
    - opportunity_list
    - operational_risk_list
    - quick_reference_tools
    - market_intelligence
    - communication_templates
    - role_specific_guides
  priority: high

compliance_review_task:
  description: >
    Conduct a compliance review using local, regional, and international regulations.
    Output actionable compliance recommendations and highlight critical violations or gaps.
  agent: compliance_analysis_agent
  input:
    - company_profile
    - jurisdiction
    - operations_data
  output:
    - compliance_summary
    - risk_gaps
    - legal_recommendations
  priority: high

strategy_development_task:
  description: >
    Create a sustainability strategy roadmap based on insights from compliance
    and business analysis tasks.
    Prioritize actions with ROI, competitive positioning, and stakeholder impacts.
  agent: strategy_recommendation_agent
  input:
    - business_benchmark
    - compliance_summary
    - opportunity_list
  output:
    - strategic_initiatives
    - roi_analysis
    - market_positioning
  priority: medium

report_compilation_task:
  description: >
    Combine outputs from all previous tasks into the final executive report.
    Include business KPIs, compliance insights, opportunities, recommended actions,
    and all generated toolkit resources: quick reference tools, market intelligence,
    communication templates, role-specific guides.
    Must not include any test, quiz, or assessment.
  agent: report_generator_agent
  input:
    - business_benchmark
    - opportunity_list
    - compliance_summary
    - strategic_initiatives
    - quick_reference_tools
    - market_intelligence
    - communication_templates
    - role_specific_guides
  output:
    - formatted_markdown
    - pdf_export
    - json_export
  priority: high
