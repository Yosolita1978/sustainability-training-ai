# agents.yaml — Pure Business Toolkit Version with embedded prompt logic
# Updated for Phase 1 & 2 — All educational content, assessments, and tests removed
# Includes explicit prompt instructions to always create:
# - quick_reference_tools
# - market_intelligence
# - communication_templates
# - role_specific_guides

business_toolkit_agent:
  description: >
    Core business analysis and toolkit agent.
    Focuses on sustainability strategy, operational improvements,
    risk & opportunity identification, and actionable recommendations
    including practical resources for immediate use.
  goals:
    - Perform sustainability benchmarking against industry peers
    - Identify compliance gaps and financial/business impacts
    - Recommend operational and strategic improvements
    - Generate quick reference tools for operational teams
    - Extract market intelligence and industry trends
    - Create communication templates for internal/external use
    - Develop role-specific sustainability guides
  tools:
    - compliance_lookup
    - sustainability_data_extractor
    - market_trend_analyzer
  output_format: "structured_json"
  tone: "professional"
  prompt_template: |
    You are a sustainability and business strategy assistant.
    Your goal is to create a complete Sustainability Business Toolkit for {{company_profile.name}}
    in the {{industry_sector}} sector, based on the provided company profile and operations data.

    **DELIVERABLES**
    Return all outputs as structured JSON, with the following fields (each must be a non-empty list unless data
    is genuinely unavailable):

    1. "quick_reference_tools":
       - Short actionable checklists or cheat-sheets (max 5), useful for daily operations.

    2. "market_intelligence":
       - Competitive trend insights, summary of business opportunities, key benchmark stats, and industry observations (max 5).

    3. "communication_templates":
       - At least 2 ready-to-use email or messaging templates for internal and external stakeholders regarding sustainability initiatives.

    4. "role_specific_guides":
       - At least 2 short guides for sustainability implementation, one tailored for managers, one for team members or specialists.

    Always also include:
    - "business_benchmark" (at least one finding),
    - "opportunity_list" (at least one strategic opportunity),
    - "operational_risk_list" (key operational risks identified).

    Return strictly in structured JSON with no explanations outside of list content.

    **EXAMPLE OUTPUT FORMAT**
    {
      "quick_reference_tools": [
        {"title": "Daily Sustainability Checklist", "description": "Key actions every employee should take"},
        {"title": "Carbon Footprint Reduction Steps", "description": "Five simple ways to cut daily emissions"}
      ],
      "market_intelligence": [
        {"trend": "Rise of Circular Economy", "summary": "Increased adoption across EU manufacturing"},
        {"trend": "Green Finance Uptake", "summary": "More SMEs using sustainability-linked loans"}
      ],
      "communication_templates": [
        {"name": "Internal Sustainability Announcement", "template": "Subject: Sustainability Update\nBody: ..."},
        {"name": "Client ESG Compliance Update", "template": "Subject: Regulatory Compliance Update\nBody: ..."}
      ],
      "role_specific_guides": [
        {"role": "Manager", "guide": "How to implement reporting lines for sustainability KPIs"},
        {"role": "Team Member", "guide": "Daily checklist for greener operations"}
      ],
      "business_benchmark": {"score": "Top 20% industry performance"},
      "opportunity_list": [
        {"opportunity_name": "Expand into eco-packaging market", "description": "High demand in EU consumer goods"}
      ],
      "operational_risk_list": [
        "Reliance on non-renewable energy in supply chain",
        "Limited tracking of Scope 3 emissions"
      ]
    }

    Do not include any quiz, test, or educational assessment in your response.

compliance_analysis_agent:
  description: >
    Specialist for regulatory compliance analysis.
    Identifies relevant laws, sector-specific frameworks, and potential violations,
    then outputs practical next steps for business leaders.
  goals:
    - Map local and international compliance requirements
    - Highlight any risk areas and possible penalties
    - Suggest improvement actions and documentation
  tools:
    - regulation_database_connector
    - violation_case_search
  output_format: "markdown"
  tone: "authoritative"

strategy_recommendation_agent:
  description: >
    Expert for creating sustainability roadmaps and competitive positioning strategies.
    Uses compliance and market insight to propose growth- and efficiency-focused actions.
  goals:
    - Integrate sustainability with business growth strategies
    - Identify market opportunities from green/regenerative trends
    - Prioritize actions with ROI analysis
  tools:
    - trend_forecasting_tool
    - roi_estimation_model
  output_format: "markdown"
  tone: "forward-looking"

report_generator_agent:
  description: >
    Formats and structures the sustainability business analysis output
    into a final export-ready report (Markdown, PDF, JSON).
  goals:
    - Produce well-structured and clear reports for executives
    - Include KPIs, compliance results, recommendations, and generated tools/templates
    - Never include any form of quiz, test, or educational assessment
  tools:
    - markdown_formatter
    - pdf_exporter
    - json_exporter
  output_format: "multi"
  tone: "clear"
