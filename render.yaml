services:
  - type: web
    name: sustainability-training-ai
    env: python
    runtime: python-3.11
    plan: starter
    buildCommand: |
      echo "🔧 Installing dependencies..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ Dependencies installed"
    startCommand: |
      echo "🚀 Starting Panel application..."
      panel serve app.py --port=$PORT --allow-websocket-origin=* --address=0.0.0.0
    healthCheckPath: /
    # Extended timeouts for health checks
    healthCheckDelay: 30
    healthCheckPeriod: 10
    healthCheckTimeout: 10
    healthCheckFailureThreshold: 5
    # Environment variables
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: PANEL_ALLOW_WEBSOCKET_ORIGIN
        value: "*"
      - key: PYTHONPATH
        value: "/opt/render/project/repo/src"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PANEL_DEV
        value: "false"
      - key: PANEL_AUTORELOAD
        value: "false"
    # Resource scaling
    scaling:
      minInstances: 1
      maxInstances: 3
    # Persistent storage for temporary files
    disk:
      name: sustainability-data
      mountPath: /tmp
      sizeGB: 1