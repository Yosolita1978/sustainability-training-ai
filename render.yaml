services:
  - type: web
    name: sustainability-training-ai
    env: python
    runtime: python-3.11
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: panel serve app.py --port=$PORT --allow-websocket-origin=*
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: PANEL_ALLOW_WEBSOCKET_ORIGIN
        value: "*"
      - key: PYTHONPATH
        value: "/opt/render/project/repo/src"
      - key: PYTHONUNBUFFERED
        value: "1"
    scaling:
      minInstances: 1
      maxInstances: 3
    disk:
      name: sustainability-data
      mountPath: /tmp
      sizeGB: 1